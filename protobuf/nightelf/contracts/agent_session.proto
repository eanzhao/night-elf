syntax = "proto3";

package nightelf.contracts.system.agent_session;

import "aelf/core.proto";

option csharp_namespace = "NightElf.Contracts.System.AgentSession.Protobuf";

message OpenSessionInput {
    aelf.Address agent_address = 1;
    int64 token_budget = 2;
}

message RecordStepInput {
    aelf.Hash session_id = 1;
    aelf.Hash step_content_hash = 2;
    int64 input_tokens = 3;
    int64 output_tokens = 4;
}

message FinalizeSessionInput {
    aelf.Hash session_id = 1;
}

message SessionState {
    aelf.Hash session_id = 1;
    aelf.Address agent_address = 2;
    int64 token_budget = 3;
    int64 input_tokens_consumed = 4;
    int64 output_tokens_consumed = 5;
    bool is_finalized = 6;
    int64 opened_at_block_height = 7;
    int32 opened_at_transaction_index = 8;
    string opened_by = 9;
    string finalized_by = 10;
    int64 finalized_at_block_height = 11;
}

message SessionOpened {
    aelf.Hash session_id = 1;
    aelf.Address agent_address = 2;
    int64 token_budget = 3;
    string opened_by = 4;
    int64 block_height = 5;
    int32 transaction_index = 6;
}

message StepRecorded {
    aelf.Hash session_id = 1;
    aelf.Hash step_content_hash = 2;
    int64 input_tokens = 3;
    int64 output_tokens = 4;
    int64 total_tokens_consumed = 5;
}

message SessionFinalized {
    aelf.Hash session_id = 1;
    int64 total_tokens_consumed = 2;
    int64 remaining_budget = 3;
    string finalized_by = 4;
    int64 block_height = 5;
}
